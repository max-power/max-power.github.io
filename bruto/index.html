<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRUTO</title>
    <link rel="icon" href="favicon.png" type="image/png" />
    <style>
      :root {
        color-scheme: light dark;
        accent-color: deeppink;
      }
      body {
        padding: 0;
        margin: 0;
        display: grid;
        height: 100dvh;
        place-items: center;
        touch-action: none;
      }

      #logo-bruto {
        color: light-dark(black, white);
        cursor: pointer;
        transition: color 0.5s ease;
        translate: 0px 0px;
        rotate: 0deg;
        user-select: none;
        touch-action: none;
        overflow: visible;

        &.is-sleeping {
          color: light-dark(#d0d0d0, #333333);
          transition-duration: 7s;
          transition-delay: 1s;
        }

        .bruto-text {
          color: light-dark(black, white);
        }

        .bruto-eyes .eye {
          transform-origin: center;
          transform-box: fill-box;
          pointer-events: none;
          /* Set initial state */
          translate: 0 0;
          scale: 1 1;
        }
      }
    </style>
    <script src="bruto.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        window.bruto = new Bruto("logo-bruto");
      });
    </script>
  </head>
